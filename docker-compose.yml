version: '3.8'

services:
  web:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    networks:
      - app-network

  nuclei:
    image: projectdiscovery/nuclei:latest
    depends_on:
      - web
    networks:
      - app-network
    entrypoint: >
      sh -c "
      until curl -s http://web:8000; do sleep 2; done &&
      nuclei -u http://web:8000 -json -o /output/nuclei.json
      "
    volumes:
      - ./output:/output

  zap:
    image: owasp/zap2docker-stable
    depends_on:
      - web
    networks:
      - app-network
    entrypoint: >
      sh -c "
      until curl -s http://web:8000; do sleep 2; done &&
      zap-baseline.py -t http://web:8000 -J /output/zap.json
      "
    volumes:
      - ./output:/output

networks:
  app-network:
